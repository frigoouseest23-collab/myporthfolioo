<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Bosman Naibaho</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-main: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Seamless fade-in */
        #main-wrapper { opacity: 0; transform: translateY(0); transition: opacity 0.7s ease-out; }
        .content-ready #main-wrapper { opacity: 1; }

        /* Animation */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { opacity: 0; }
        .reveal.active { animation: fadeInUp 0.5s ease-out forwards; }

        .nav-scrolled { background: rgba(255, 255, 255, 0.98); border-bottom: 2px solid var(--brand-main); }
        
        /* Mobile Nav */
        #mobile-menu { transition: all 0.2s ease-in-out; opacity: 0; pointer-events: none; visibility: hidden; }
        #mobile-menu.open { opacity: 1; pointer-events: auto; visibility: visible; }

        /* Video Modal */
        #video-modal { transition: all 0.3s ease; display: none; opacity: 0; }
        #video-modal.active { display: flex; opacity: 1; }

        /* Global Reset for Sharp Edges (No Rounded) */
        * { border-radius: 0 !important; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: { 
                            50: 'color-mix(in srgb, var(--brand-main) 10%, white)', 
                            100: 'color-mix(in srgb, var(--brand-main) 20%, white)', 
                            500: 'color-mix(in srgb, var(--brand-main) 80%, white)', 
                            600: 'var(--brand-main)', 
                            700: 'color-mix(in srgb, var(--brand-main) 85%, black)', 
                            900: 'color-mix(in srgb, var(--brand-main) 60%, black)' 
                        } 
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-slate-900 selection:bg-brand-600 selection:text-white uppercase-titles">

    <!-- Preloader Minimalis -->
    <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-white transition-opacity duration-500">
        <div class="w-8 h-8 border-2 border-slate-200 border-t-brand-600 animate-spin"></div>
    </div>

    <!-- Video Modal (Sharp) -->
    <div id="video-modal" class="fixed inset-0 z-[200] bg-slate-900/98 items-center justify-center p-0 md:p-12">
        <div class="relative w-full max-w-5xl aspect-video bg-black shadow-2xl">
            <button onclick="closeVideo()" class="absolute top-0 right-0 z-10 bg-brand-600 p-3 text-white hover:bg-brand-700 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <iframe id="video-frame" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <div id="main-wrapper">
        <!-- Navbar (Compact) -->
        <header id="navbar" class="fixed w-full top-0 z-50 transition-all duration-300 py-3 md:py-4">
            <div class="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                <a href="#beranda" class="text-2xl font-[900] tracking-tighter text-slate-900" id="teks-logo-container">
                    <span id="teks-logo"></span><span class="text-brand-600">.</span>
                </a>
                
                <nav class="hidden md:flex items-center space-x-8 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                    <a href="#beranda" class="hover:text-brand-600 transition-colors">Home</a>
                    <a href="#tentang" class="hover:text-brand-600 transition-colors">About</a>
                    <a href="#portofolio" class="hover:text-brand-600 transition-colors">Portfolio</a>
                    <a href="#kontak" class="bg-slate-900 text-white px-5 py-2 hover:bg-brand-600 transition-all">Contact</a>
                </nav>

                <button id="menu-toggle" class="md:hidden p-2 text-slate-900 focus:outline-none">
                    <svg id="menu-icon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h20M4 12h20m-7 6h7"></path>
                    </svg>
                </button>
            </div>

            <!-- Mobile Nav -->
            <div id="mobile-menu" class="absolute top-full left-0 w-full bg-white border-b-4 border-brand-600 md:hidden py-8 px-8 shadow-2xl">
                <nav class="flex flex-col space-y-5 text-center font-black uppercase tracking-[0.2em] text-xs text-slate-400">
                    <a href="#beranda" class="mobile-link hover:text-brand-600">Home</a>
                    <a href="#tentang" class="mobile-link hover:text-brand-600">About</a>
                    <a href="#portofolio" class="mobile-link hover:text-brand-600">Portfolio</a>
                    <a href="#kontak" class="mobile-link py-3 bg-brand-600 text-white">Let's Talk</a>
                </nav>
            </div>
        </header>

        <!-- Hero Section (Compact & Responsive Order) -->
        <section id="beranda" class="pt-24 pb-10 md:pt-32 md:pb-16 border-b border-slate-100">
            <div class="max-w-7xl mx-auto px-6 md:px-12 grid lg:grid-cols-2 gap-8 items-center w-full">
                <!-- Profile Image (Order 1 on mobile) - No Frame -->
                <div class="flex justify-center lg:justify-end reveal active order-1 lg:order-2">
                    <div class="relative w-full max-w-sm aspect-square">
                        <img id="link-foto-profil" src="" alt="Profile" class="w-full h-full object-cover">
                    </div>
                </div>

                <!-- Text Content (Order 2 on mobile) -->
                <div class="space-y-5 reveal active text-center lg:text-left order-2 lg:order-1">
                    <div class="inline-block px-3 py-1 bg-brand-600 text-white text-[9px] font-black uppercase tracking-widest shadow-sm" id="teks-status"></div>
                    <h1 class="text-4xl md:text-6xl lg:text-7xl font-[900] text-slate-900 leading-none uppercase tracking-tighter" id="teks-nama"></h1>
                    <p class="text-sm md:text-base text-slate-500 leading-relaxed max-w-lg mx-auto lg:mx-0 font-medium" id="teks-deskripsi-hero"></p>
                    <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-3 pt-2">
                        <a href="#portofolio" class="w-full sm:w-auto bg-slate-900 text-white px-10 py-4 font-black text-xs uppercase tracking-widest hover:bg-brand-600 transition-all text-center">View Works</a>
                        <button id="btn-video" onclick="openVideo()" class="hidden w-full sm:w-auto flex items-center justify-center space-x-2 px-8 py-4 font-black text-xs uppercase tracking-widest border-2 border-slate-900 bg-white hover:bg-slate-50 transition-all">
                            <span>Watch Intro</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- About Section (Compact Grid) - No Frame -->
        <section id="tentang" class="py-12 md:py-16 bg-white border-b border-slate-100">
            <div class="max-w-7xl mx-auto px-6 md:px-12 grid lg:grid-cols-2 gap-10 items-center">
                <div class="reveal">
                    <img id="link-foto-tentang" src="" alt="About" class="w-full object-cover aspect-[4/5]">
                </div>
                <div class="space-y-6 reveal">
                    <div class="space-y-3">
                        <h2 class="text-brand-600 font-black uppercase tracking-[0.4em] text-[9px]">Overview</h2>
                        <h3 class="text-2xl md:text-4xl font-[900] text-slate-900 leading-tight uppercase tracking-tighter" id="teks-judul-tentang"></h3>
                        <p class="text-sm md:text-base text-slate-500 leading-relaxed font-medium" id="teks-deskripsi-tentang"></p>
                    </div>
                    <div class="space-y-3">
                        <h4 class="font-black text-slate-900 text-[10px] uppercase tracking-widest underline decoration-brand-600 decoration-2 underline-offset-4">Core Skills:</h4>
                        <div id="daftar-skill" class="flex flex-wrap gap-2 pt-1"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Portfolio Grid (Compact Cards) -->
        <section id="portofolio" class="py-12 md:py-16 bg-slate-50">
            <div class="max-w-7xl mx-auto px-6 md:px-12">
                <div class="mb-8 reveal">
                    <h2 class="text-brand-600 font-black uppercase tracking-[0.4em] text-[9px] mb-1">Portfolio</h2>
                    <h3 class="text-3xl md:text-5xl font-[900] text-slate-900 uppercase tracking-tighter">Selected Projects.</h3>
                </div>
                <div id="wadah-portofolio" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </section>

        <!-- Contact Section (Compact Form) -->
        <section id="kontak" class="py-12 md:py-16 bg-white">
            <div class="max-w-7xl mx-auto px-6 md:px-12">
                <div class="bg-slate-900 p-6 md:p-12 relative text-white border-l-8 border-brand-600">
                    <div class="grid lg:grid-cols-2 gap-10 items-center relative z-10">
                        <div class="space-y-4 reveal">
                            <h2 class="text-3xl md:text-5xl font-[900] leading-none uppercase tracking-tighter">Let's Build Impact.</h2>
                            <p class="text-sm text-slate-400 font-medium leading-relaxed max-w-sm">Scale your digital presence with AI-driven strategies and data-backed marketing.</p>
                        </div>
                        <div class="reveal bg-white p-6 md:p-10 text-slate-900">
                            <form id="formKontak" onsubmit="kirimPesan(event)" class="space-y-4">
                                <div class="grid md:grid-cols-2 gap-4">
                                    <input type="text" id="nama" placeholder="FULL NAME" class="w-full border-2 border-slate-100 p-4 outline-none focus:border-brand-600 font-bold text-[10px] transition-all" required>
                                    <input type="email" id="email" placeholder="EMAIL ADDRESS" class="w-full border-2 border-slate-100 p-4 outline-none focus:border-brand-600 font-bold text-[10px] transition-all" required>
                                </div>
                                <textarea id="pesan" placeholder="PROJECT DETAILS..." class="w-full border-2 border-slate-100 p-4 outline-none focus:border-brand-600 font-bold text-[10px] h-24 resize-none transition-all" required></textarea>
                                <button type="submit" id="tombolKirim" class="w-full bg-slate-900 text-white p-4 font-black text-[10px] uppercase tracking-widest hover:bg-brand-600 transition-all active:scale-[0.98]">
                                    Send Message
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer (Icon Only) -->
        <footer class="py-8 bg-slate-900 text-white border-t border-white/5">
            <div class="max-w-7xl mx-auto px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-6">
                <p id="teks-footer" class="text-slate-500 font-black uppercase tracking-[0.2em] text-[9px]"></p>
                <div class="flex items-center space-x-6">
                    <a id="link-github" href="#" target="_blank" class="text-slate-500 hover:text-white transition-all transform hover:scale-110">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
                    </a>
                    <a id="link-linkedin" href="#" target="_blank" class="text-slate-500 hover:text-white transition-all transform hover:scale-110">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    </a>
                    <a id="link-instagram" href="#" target="_blank" class="text-slate-500 hover:text-white transition-all transform hover:scale-110">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxWcY7C8KCUdLrF4yddLlrJr3SF9uxu_OWMjouDxGcjziqWc5GeCbfuLxv9ZL4-eELKYQ/exec'; 
        let videoUrl = "";

        function openVideo() {
            if(!videoUrl) return;
            const modal = document.getElementById('video-modal');
            const iframe = document.getElementById('video-frame');
            iframe.src = videoUrl + (videoUrl.includes('?') ? '&' : '?') + "autoplay=1";
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeVideo() {
            const modal = document.getElementById('video-modal');
            const iframe = document.getElementById('video-frame');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                iframe.src = "";
            }, 300);
        }

        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        menuToggle.addEventListener('click', () => {
            const isOpen = mobileMenu.classList.toggle('open');
            menuIcon.innerHTML = isOpen ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h20M4 12h20m-7 6h7"></path>';
        });

        document.querySelectorAll('.mobile-link').forEach(link => {
            link.addEventListener('click', () => mobileMenu.classList.remove('open'));
        });

        async function loadContent() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                ['teks-logo', 'teks-nama', 'teks-status', 'teks-deskripsi-hero', 'teks-judul-tentang', 'teks-deskripsi-tentang', 'teks-footer'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.innerText = data[id] || "";
                });

                if(data['link-video-hero']) {
                    videoUrl = data['link-video-hero'];
                    document.getElementById('btn-video').classList.remove('hidden');
                }

                if(data['warna-tema']) document.documentElement.style.setProperty('--brand-main', data['warna-tema']);
                if(data['link-foto-profil']) document.getElementById('link-foto-profil').src = data['link-foto-profil'];
                if(data['link-foto-tentang']) document.getElementById('link-foto-tentang').src = data['link-foto-tentang'];

                ['link-github', 'link-linkedin', 'link-instagram'].forEach(id => {
                    if(data[id]) document.getElementById(id).href = data[id];
                });

                if(data['daftar-skill']) {
                    const box = document.getElementById('daftar-skill');
                    box.innerHTML = '';
                    data['daftar-skill'].split(',').forEach(skill => {
                        box.innerHTML += `<div class="bg-slate-50 text-slate-900 px-4 py-2 text-[9px] font-black border-l-4 border-brand-600 uppercase tracking-[0.1em] shadow-sm">${skill.trim()}</div>`;
                    });
                }

                if(data.portofolio) {
                    const container = document.getElementById('wadah-portofolio');
                    container.innerHTML = '';
                    data.portofolio.forEach((item, i) => {
                        container.innerHTML += `
                            <div class="group bg-white border-2 border-slate-100 hover:border-brand-600 transition-all duration-500 reveal" style="animation-delay: ${i*0.05}s">
                                <div class="h-48 overflow-hidden grayscale group-hover:grayscale-0 transition-all duration-700">
                                    <img src="${item.gambar}" class="w-full h-full object-cover">
                                </div>
                                <div class="p-6 space-y-3">
                                    <span class="text-[8px] font-black text-brand-600 uppercase tracking-widest border-b-2 border-brand-600 pb-1">${item.kategori}</span>
                                    <h4 class="text-xl font-black text-slate-900 uppercase tracking-tighter leading-tight">${item.judul}</h4>
                                    <p class="text-slate-500 text-[11px] font-medium leading-relaxed line-clamp-2">${item.deskripsi}</p>
                                </div>
                            </div>`;
                    });
                }

                document.body.classList.add('content-ready');
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                initReveal();

            } catch (err) {
                console.error("UI Error:", err);
                document.getElementById('loader').innerHTML = "Check SCRIPT_URL";
            }
        }

        function initReveal() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 30) nav.classList.add('nav-scrolled');
            else nav.classList.remove('nav-scrolled');
        });

        async function kirimPesan(e) {
            e.preventDefault();
            const b = document.getElementById('tombolKirim');
            b.disabled = true; b.innerHTML = "SENDING...";
            const fd = new FormData();
            fd.append('nama', document.getElementById('nama').value);
            fd.append('email', document.getElementById('email').value);
            fd.append('pesan', document.getElementById('pesan').value);
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                alert("SUCCESS!");
                document.getElementById('formKontak').reset();
            } finally {
                b.disabled = false; b.innerHTML = "SEND MESSAGE";
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>
</html>
