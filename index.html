<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Bosman Naibaho</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-main: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Seamless fade-in */
        #main-wrapper { opacity: 0; transform: translateY(10px); transition: opacity 1.2s ease, transform 1s ease; }
        .content-ready #main-wrapper { opacity: 1; transform: translateY(0); }

        /* Animasi */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        
        .reveal { opacity: 0; }
        .reveal.active { animation: fadeInUp 0.8s ease-out forwards; }
        .float-anim { animation: float 5s ease-in-out infinite; }

        .nav-scrolled { background: rgba(255, 255, 255, 0.9); backdrop-blur: 12px; border-bottom: 1px solid rgba(226, 232, 240, 0.3); }
        
        /* Mobile Menu */
        #mobile-menu { transition: all 0.3s ease-in-out; transform: translateY(-20px); opacity: 0; pointer-events: none; visibility: hidden; }
        #mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; visibility: visible; }

        /* Modal Video */
        #video-modal { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: none; opacity: 0; }
        #video-modal.active { display: flex; opacity: 1; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: { 
                            50: 'color-mix(in srgb, var(--brand-main) 10%, white)', 
                            100: 'color-mix(in srgb, var(--brand-main) 20%, white)', 
                            500: 'color-mix(in srgb, var(--brand-main) 80%, white)', 
                            600: 'var(--brand-main)', 
                            700: 'color-mix(in srgb, var(--brand-main) 85%, black)', 
                            900: 'color-mix(in srgb, var(--brand-main) 60%, black)' 
                        } 
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#fafafa] text-slate-900 selection:bg-brand-600 selection:text-white">

    <!-- Preloader Sederhana -->
    <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center bg-white transition-opacity duration-500">
        <div class="w-10 h-10 border-4 border-slate-100 border-t-brand-600 rounded-full animate-spin"></div>
    </div>

    <!-- Video Modal (Pop-up Video) -->
    <div id="video-modal" class="fixed inset-0 z-[200] bg-slate-900/95 items-center justify-center p-4 md:p-12">
        <div class="relative w-full max-w-5xl aspect-video bg-black rounded-[2rem] md:rounded-[3rem] overflow-hidden shadow-2xl border border-white/10">
            <button onclick="closeVideo()" class="absolute top-6 right-6 z-10 bg-white/10 hover:bg-white/20 p-3 rounded-full text-white transition-all backdrop-blur-md">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <iframe id="video-frame" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <div id="main-wrapper">
        <!-- Navbar -->
        <header id="navbar" class="fixed w-full top-0 z-50 transition-all duration-500 py-4 md:py-6">
            <div class="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                <a href="#beranda" class="text-2xl md:text-3xl font-[900] tracking-tighter text-slate-900 group transition-all" id="teks-logo-container">
                    <span id="teks-logo"></span><span class="text-brand-600">.</span>
                </a>
                
                <!-- Nav Desktop -->
                <nav class="hidden md:flex items-center space-x-10 text-[13px] font-bold uppercase tracking-widest text-slate-500">
                    <a href="#beranda" class="hover:text-brand-600 transition-colors">Home</a>
                    <a href="#tentang" class="hover:text-brand-600 transition-colors">About</a>
                    <a href="#portofolio" class="hover:text-brand-600 transition-colors">Work</a>
                    <a href="#kontak" class="bg-slate-900 text-white px-7 py-3 rounded-full hover:bg-brand-600 transition-all shadow-lg shadow-slate-200">Contact</a>
                </nav>

                <!-- Tombol Hamburger Mobile -->
                <button id="menu-toggle" class="md:hidden p-2 text-slate-900 focus:outline-none">
                    <svg id="menu-icon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>

            <!-- Menu Mobile -->
            <div id="mobile-menu" class="absolute top-full left-0 w-full bg-white border-b border-slate-100 md:hidden py-8 px-6 shadow-2xl">
                <nav class="flex flex-col space-y-6 text-center font-bold uppercase tracking-widest text-sm text-slate-600">
                    <a href="#beranda" class="mobile-link py-2">Home</a>
                    <a href="#tentang" class="mobile-link py-2">About</a>
                    <a href="#portofolio" class="mobile-link py-2">Work</a>
                    <a href="#kontak" class="mobile-link py-4 bg-brand-600 text-white rounded-2xl">Contact Me</a>
                </nav>
            </div>
        </header>

        <!-- Hero Section -->
        <section id="beranda" class="min-h-screen flex items-center pt-32 pb-16">
            <div class="max-w-7xl mx-auto px-6 md:px-12 grid lg:grid-cols-2 gap-12 lg:gap-16 items-center w-full">
                <!-- Foto Profil (Urutan 1 di HP agar di atas nama) -->
                <div class="flex justify-center lg:justify-end reveal active order-1 lg:order-2" style="animation-delay: 0.3s;">
                    <div class="relative float-anim">
                        <div class="absolute -inset-4 bg-brand-500/10 blur-3xl rounded-full -z-10"></div>
                        <img id="link-foto-profil" src="" alt="Profile" class="w-64 h-64 md:w-80 md:h-80 lg:w-[30rem] lg:h-[30rem] rounded-[3rem] md:rounded-[4rem] object-cover shadow-2xl border-4 md:border-8 border-white ring-1 ring-slate-100">
                    </div>
                </div>

                <!-- Teks Hero (Urutan 2 di HP) -->
                <div class="space-y-6 md:space-y-8 reveal active text-center lg:text-left order-2 lg:order-1">
                    <div class="inline-flex items-center px-4 py-2 rounded-full bg-brand-50 text-brand-700 border border-brand-100 text-[10px] md:text-[11px] font-black uppercase tracking-widest" id="teks-status"></div>
                    <h1 class="text-4xl md:text-6xl lg:text-8xl font-[900] text-slate-900 leading-[1.1] tracking-tight" id="teks-nama"></h1>
                    <p class="text-base md:text-xl text-slate-500 leading-relaxed max-w-xl mx-auto lg:mx-0 font-medium" id="teks-deskripsi-hero"></p>
                    <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-4 pt-4">
                        <a href="#portofolio" class="w-full sm:w-auto bg-brand-600 text-white px-10 py-4 md:py-5 rounded-2xl font-bold text-lg hover:bg-brand-700 transition-all shadow-xl shadow-brand-200 text-center">Explore Work</a>
                        <!-- Tombol Video (Akan muncul jika link-video-hero diisi di Sheet) -->
                        <button id="btn-video" onclick="openVideo()" class="hidden w-full sm:w-auto flex items-center justify-center space-x-3 px-8 py-4 md:py-5 rounded-2xl font-bold text-lg border border-slate-200 bg-white hover:bg-slate-50 transition-all shadow-sm">
                            <svg class="w-6 h-6 text-brand-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                            <span>Watch Intro</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="tentang" class="py-24 md:py-40 bg-white">
            <div class="max-w-7xl mx-auto px-6 md:px-12 grid lg:grid-cols-2 gap-16 md:gap-24 items-center">
                <div class="reveal">
                    <img id="link-foto-tentang" src="" alt="About Me" class="rounded-[2rem] md:rounded-[3rem] shadow-xl w-full border-4 border-slate-50 object-cover aspect-[4/5]">
                </div>
                <div class="space-y-8 md:space-y-10 reveal">
                    <div class="space-y-4 md:space-y-6">
                        <h2 class="text-brand-600 font-black uppercase tracking-[0.3em] text-[10px] md:text-xs">Overview</h2>
                        <h3 class="text-3xl md:text-5xl font-extrabold text-slate-900 leading-tight" id="teks-judul-tentang"></h3>
                        <p class="text-base md:text-xl text-slate-500 leading-relaxed font-medium" id="teks-deskripsi-tentang"></p>
                    </div>
                    <div class="space-y-5 md:space-y-6">
                        <h4 class="font-bold text-slate-900 text-lg">Specializations:</h4>
                        <div id="daftar-skill" class="flex flex-wrap gap-3 md:gap-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Portfolio Grid (Responsif 1-2-3 kolom) -->
        <section id="portofolio" class="py-24 md:py-40 bg-[#f8fafc]">
            <div class="max-w-7xl mx-auto px-6 md:px-12">
                <div class="text-center mb-16 md:mb-24 reveal">
                    <h2 class="text-brand-600 font-black uppercase tracking-[0.3em] text-[10px] md:text-xs mb-4">Portfolio</h2>
                    <h3 class="text-3xl md:text-6xl font-[900] text-slate-900">Selected Works</h3>
                </div>
                <div id="wadah-portofolio" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10"></div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="kontak" class="py-24 md:py-40 bg-white">
            <div class="max-w-7xl mx-auto px-6 md:px-12">
                <div class="bg-slate-900 rounded-[2.5rem] md:rounded-[4rem] p-8 md:p-24 relative overflow-hidden text-white shadow-2xl">
                    <div class="absolute top-0 right-0 w-64 md:w-96 h-64 md:h-96 bg-brand-600/10 blur-[100px] rounded-full translate-x-1/2 -translate-y-1/2"></div>
                    <div class="max-w-3xl space-y-8 md:space-y-12 relative z-10 text-center md:text-left">
                        <h2 class="text-4xl md:text-7xl font-black leading-tight">Ready to start?</h2>
                        <form id="formKontak" onsubmit="kirimPesan(event)" class="space-y-5 md:space-y-6 text-slate-900">
                            <div class="grid md:grid-cols-2 gap-5 md:gap-6 text-left">
                                <div class="space-y-2">
                                    <label class="text-slate-400 text-xs font-bold uppercase ml-2">Name</label>
                                    <input type="text" id="nama" placeholder="Your Name" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:ring-4 ring-brand-600/30 text-white font-medium" required>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-slate-400 text-xs font-bold uppercase ml-2">Email</label>
                                    <input type="email" id="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:ring-4 ring-brand-600/30 text-white font-medium" required>
                                </div>
                            </div>
                            <div class="space-y-2 text-left">
                                <label class="text-slate-400 text-xs font-bold uppercase ml-2">Message</label>
                                <textarea id="pesan" placeholder="Project details..." class="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none focus:ring-4 ring-brand-600/30 text-white font-medium h-32 md:h-40 resize-none" required></textarea>
                            </div>
                            <button type="submit" id="tombolKirim" class="w-full md:w-auto bg-brand-600 text-white px-12 py-5 rounded-2xl font-black text-xl hover:bg-brand-500 transition-all shadow-xl shadow-brand-600/20 active:scale-95">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-12 md:py-20 bg-white border-t border-slate-50">
            <div class="max-w-7xl mx-auto px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-8 md:gap-10 text-center md:text-left">
                <p id="teks-footer" class="text-slate-400 font-bold uppercase tracking-widest text-[9px] md:text-[11px]"></p>
                <div class="flex items-center space-x-8 md:space-x-12 text-[10px] md:text-[12px] font-black uppercase tracking-[0.2em]">
                    <a id="link-github" href="#" target="_blank" class="text-slate-400 hover:text-slate-900 transition-colors">Github</a>
                    <a id="link-linkedin" href="#" target="_blank" class="text-slate-400 hover:text-brand-600 transition-colors">LinkedIn</a>
                    <a id="link-instagram" href="#" target="_blank" class="text-slate-400 hover:text-rose-500 transition-colors">Instagram</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxWcY7C8KCUdLrF4yddLlrJr3SF9uxu_OWMjouDxGcjziqWc5GeCbfuLxv9ZL4-eELKYQ/exec'; 
        let videoUrl = "";

        // Fungsi Pop-up Video
        function openVideo() {
            if(!videoUrl) return;
            const modal = document.getElementById('video-modal');
            const iframe = document.getElementById('video-frame');
            iframe.src = videoUrl + (videoUrl.includes('?') ? '&' : '?') + "autoplay=1";
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeVideo() {
            const modal = document.getElementById('video-modal');
            const iframe = document.getElementById('video-frame');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                iframe.src = "";
            }, 400);
        }

        // Toggle Menu HP
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        menuToggle.addEventListener('click', () => {
            const isOpen = mobileMenu.classList.toggle('open');
            menuIcon.innerHTML = isOpen ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path>';
        });

        // Tutup menu saat link diklik
        document.querySelectorAll('.mobile-link').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('open');
                menuIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7"></path>';
            });
        });

        async function loadContent() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                // 1. Isi Teks
                ['teks-logo', 'teks-nama', 'teks-status', 'teks-deskripsi-hero', 'teks-judul-tentang', 'teks-deskripsi-tentang', 'teks-footer'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.innerText = data[id] || "";
                });

                // 2. Logika Tombol Video
                if(data['link-video-hero']) {
                    videoUrl = data['link-video-hero'];
                    document.getElementById('btn-video').classList.remove('hidden');
                }

                // 3. Tema & Gambar
                if(data['warna-tema']) document.documentElement.style.setProperty('--brand-main', data['warna-tema']);
                if(data['link-foto-profil']) document.getElementById('link-foto-profil').src = data['link-foto-profil'];
                if(data['link-foto-tentang']) document.getElementById('link-foto-tentang').src = data['link-foto-tentang'];

                // 4. Sosial Media
                ['link-github', 'link-linkedin', 'link-instagram'].forEach(id => {
                    if(data[id]) document.getElementById(id).href = data[id];
                });

                // 5. Daftar Keahlian (Skills)
                if(data['daftar-skill']) {
                    const box = document.getElementById('daftar-skill');
                    box.innerHTML = '';
                    data['daftar-skill'].split(',').forEach(skill => {
                        box.innerHTML += `<span class="bg-brand-50 text-brand-700 px-6 py-3 rounded-2xl text-[12px] font-black border border-brand-100 uppercase tracking-wider">${skill.trim()}</span>`;
                    });
                }

                // 6. Daftar Proyek (Portfolio)
                if(data.portofolio) {
                    const container = document.getElementById('wadah-portofolio');
                    container.innerHTML = '';
                    data.portofolio.forEach((item, i) => {
                        container.innerHTML += `
                            <div class="group relative bg-white rounded-[2.5rem] md:rounded-[3rem] overflow-hidden border border-slate-100 hover:shadow-2xl transition-all duration-700 reveal" style="animation-delay: ${i*0.1}s">
                                <div class="h-64 overflow-hidden relative">
                                    <div class="absolute inset-0 bg-slate-900/5 group-hover:bg-transparent transition-all z-10"></div>
                                    <img src="${item.gambar}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                                </div>
                                <div class="p-10 space-y-5">
                                    <span class="text-[10px] font-black text-brand-600 uppercase tracking-widest">${item.kategori}</span>
                                    <h4 class="text-2xl font-black text-slate-900 leading-tight">${item.judul}</h4>
                                    <p class="text-slate-500 text-[15px] font-medium leading-relaxed line-clamp-3">${item.deskripsi}</p>
                                    <button class="flex items-center space-x-3 text-brand-600 font-bold group-hover:translate-x-2 transition-transform">
                                        <span class="text-sm">View Project</span>
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                    </button>
                                </div>
                            </div>`;
                    });
                }

                // Selesaikan Loading
                document.body.classList.add('content-ready');
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                initReveal();

            } catch (err) {
                console.error("UI Error:", err);
            }
        }

        // Animasi Scroll
        function initReveal() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('nav-scrolled', 'py-4');
            else nav.classList.remove('nav-scrolled', 'py-6');
        });

        // Kirim Pesan Form
        async function kirimPesan(e) {
            e.preventDefault();
            const b = document.getElementById('tombolKirim');
            b.disabled = true; b.innerHTML = "Processing...";
            const fd = new FormData();
            fd.append('nama', document.getElementById('nama').value);
            fd.append('email', document.getElementById('email').value);
            fd.append('pesan', document.getElementById('pesan').value);
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                alert("Message Sent! 🕊️");
                document.getElementById('formKontak').reset();
            } finally {
                b.disabled = false; b.innerHTML = "Send Message";
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>
</html>
